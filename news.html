<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関連情報 — Spice Of Tournament 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050507;--paper:#0d0c10;--border:#1e1c22;
  --lamp:#cc2222;--lamp-bright:#ff4444;--lamp-dim:#6b1414;
  --text:#e8e2d5;--muted:#5c5850;
}
html{scroll-behavior:smooth;}
@keyframes flicker{0%,93%,100%{opacity:1;}94%{opacity:0.55;filter:brightness(1.5);}95%{opacity:0.9;}96%{opacity:0.4;filter:brightness(0.6);}97%{opacity:1;}}
@keyframes drift{0%{transform:translateY(-8vh) translateX(0);opacity:0;}10%{opacity:0.3;}90%{opacity:0.15;}100%{transform:translateY(108vh) translateX(-10px);opacity:0;}}
@keyframes lampGlow{0%,100%{text-shadow:0 0 20px rgba(204,34,34,0.4),0 0 60px rgba(204,34,34,0.2);}50%{text-shadow:0 0 30px rgba(255,68,68,0.6),0 0 90px rgba(204,34,34,0.25);}}
@keyframes lampSway{0%,100%{transform:rotate(-1.5deg);}50%{transform:rotate(1.5deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;overflow-x:hidden;animation:flicker 14s infinite;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,transparent 40%,rgba(0,0,0,0.5) 100%);pointer-events:none;z-index:9998;}
.mote{position:fixed;top:0;background:var(--lamp);border-radius:50%;box-shadow:0 0 6px 1px rgba(204,34,34,0.5);opacity:0;pointer-events:none;z-index:9997;animation:drift linear infinite;}

nav{position:fixed;top:0;left:0;right:0;padding:1rem 2rem;display:flex;align-items:center;gap:2rem;background:rgba(5,5,7,0.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);z-index:100;font-family:'Noto Sans JP',sans-serif;font-size:0.75rem;letter-spacing:0.15em;}
nav a{color:var(--muted);text-decoration:none;transition:color 0.2s;}
nav a:hover,nav a.active{color:var(--lamp-bright);}
nav .nav-home{color:var(--text);margin-right:auto;}

.page-hero{min-height:38vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 2rem 4rem;position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(204,34,34,0.08) 0%,transparent 70%);}
.page-hero-kamon{font-size:1.8rem;color:var(--lamp);margin-bottom:1.5rem;opacity:0.85;animation:lampSway 6s ease-in-out infinite;display:block;text-shadow:0 0 20px rgba(204,34,34,0.5);}
.page-hero-eyebrow{font-family:'Noto Sans JP',sans-serif;font-size:0.65rem;letter-spacing:0.5em;color:var(--muted);margin-bottom:1rem;}
.page-hero-title{font-size:clamp(2.3rem,7vw,4.5rem);font-weight:900;letter-spacing:0.1em;animation:lampGlow 4.5s ease-in-out infinite;}
.page-hero-sub{margin-top:1rem;font-size:0.85rem;color:var(--muted);letter-spacing:0.15em;font-family:'Noto Sans JP',sans-serif;}
.hero-divider{width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--lamp),transparent);margin:2rem auto 0;}

main{max-width:800px;margin:0 auto;padding:4rem 2rem 6rem;}
.section-eyebrow{font-family:'Noto Sans JP',sans-serif;font-size:0.6rem;letter-spacing:0.5em;color:var(--lamp);text-transform:uppercase;margin-bottom:0.8rem;}
.section-title{font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;color:var(--text);margin-bottom:0.5rem;}
.section-rule{width:40px;height:1px;background:var(--lamp);margin-bottom:2.5rem;}

.news-item{display:block;background:var(--paper);border:1px solid var(--border);padding:1.6rem 1.8rem;margin-bottom:1rem;text-decoration:none;animation:fadeUp 0.5s ease both;transition:border-color 0.2s,transform 0.2s;}
.news-item:hover{border-color:var(--lamp-dim);transform:translateY(-2px);}
.news-date{font-family:'Noto Sans JP',sans-serif;font-size:0.65rem;color:var(--lamp);letter-spacing:0.1em;margin-bottom:0.5rem;}
.news-title{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:0.4rem;}
.news-desc{font-family:'Noto Sans JP',sans-serif;font-size:0.8rem;color:var(--muted);line-height:1.8;}
.news-link-tag{margin-top:0.8rem;font-family:'Noto Sans JP',sans-serif;font-size:0.7rem;color:var(--lamp);letter-spacing:0.05em;}

footer{border-top:1px solid var(--border);padding:2.5rem 2rem;text-align:center;font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;font-family:'Noto Sans JP',sans-serif;}
.footer-curse{margin-top:1.2rem;color:#3a2a10;font-size:0.6rem;letter-spacing:0.08em;}
@media(max-width:480px){nav{gap:1rem;font-size:0.65rem;}}
</style>
</head>
<body>
<script>
for(let i=0;i<10;i++){const m=document.createElement('div');m.className='mote';m.style.left=Math.random()*100+'vw';const s=(2+Math.random()*3)+'px';m.style.width=s;m.style.height=s;m.style.animationDuration=(10+Math.random()*14)+'s';m.style.animationDelay=(Math.random()*12)+'s';document.body.appendChild(m);}
</script>

<nav>
  <a href="index.html" class="nav-home">🔦 Spice Of Tournament</a>
  <a href="prizes.html">賞品紹介</a>
  <a href="participants.html">参加団体</a>
  <a href="sale.html">スパセール</a>
  <a href="news.html" class="active">関連情報</a>
</nav>

<div class="page-hero">
  <span class="page-hero-kamon">🔦</span>
  <p class="page-hero-eyebrow">Related News</p>
  <h1 class="page-hero-title">関連情報</h1>
  <p class="page-hero-sub">大会に関するお知らせ・告知の一覧</p>
  <div class="hero-divider"></div>
</div>

<main>
  <p class="section-eyebrow">All News</p>
  <h2 class="section-title">お知らせ一覧</h2>
  <div class="section-rule"></div>
  <div id="news-list-full"></div>
</main>

<footer>
  &copy; 2026　Spice Of Tournament　All Rights Reserved
  <div class="footer-curse">─ 灯りを失った者の記録は、ここには残らない ─</div>
</footer>

<script src="news-data.js"></script>
<script>
(function(){
  const list = document.getElementById('news-list-full');
  if(!list || typeof newsData === 'undefined') return;
  list.innerHTML = newsData.map(n => {
    if(n.tweetUrl){
      return `
      <div class="news-item" style="cursor:default;">
        <p class="news-date">${n.date}</p>
        <p class="news-title">${n.title}</p>
        ${n.desc ? `<p class="news-desc" style="margin-bottom:1rem;">${n.desc}</p>` : ''}
        <div style="display:flex;justify-content:center;margin-top:1rem;">
          <blockquote class="twitter-tweet" data-theme="dark" data-width="500">
            <a href="${n.tweetUrl}"></a>
          </blockquote>
        </div>
      </div>`;
    }
    return `
    <a class="news-item" href="#">
      <p class="news-date">${n.date}</p>
      <p class="news-title">${n.title}</p>
      ${n.desc ? `<p class="news-desc">${n.desc}</p>` : ''}
    </a>`;
  }).join('');
  if(window.twttr && window.twttr.widgets){ window.twttr.widgets.load(); }
})();
</script>
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>
</html>
